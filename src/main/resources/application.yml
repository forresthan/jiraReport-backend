server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: jira-report-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jira_tools?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ""

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jirareport.mapper.entity

jwt:
  secret: jira-tools-super-secret-key-2024-very-long-and-secure-key-for-jwt-signing
  expiration: 86400000

jira:
  base-url: http://jira.gf.com.cn
  username: your-username
  password: your-password
  project-key: CFGLP

gitlab:
  base-url: https://gitlab.example.com
  private-token: your-gitlab-token

qc:
  base-url: https://qc.yourcompany.com
  app-id: your-app-id
  app-secret: your-app-secret

robot:
  webhook-url: https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=your-key
  secret: your-secret

schedule:
  remind-bs:
    enabled: true
    cron: "0 0 9 * * ?"
  sync-gitlab:
    enabled: true
    cron: "0 0 2 * * ?"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.jirareport.controller

logging:
  level:
    com.jirareport: debug
    org.springframework: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/jira-tools.log
    max-size: 10MB
    max-history: 30